document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

yle>\n\n<style>\n  :root {\n    --bg: #1d1714;\n    --bg-2: #261e1a;\n    --bg-3: #2e251f;\n    --cream: #f1d9a6;\n    --orange: #ec8a3a;\n    --muted: rgba(241,217,166,0.65);\n    --line: rgba(241,217,166,0.12);\n    --line-2: rgba(241,217,166,0.22);\n  }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; }\n  html { scroll-behavior: smooth; }\n  body {\n    background: var(--bg);\n    color: var(--cream);\n    font-family: \"Space Grotesk\", -apple-system, sans-serif;\n    font-size: 17px;\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n    overflow-x: hidden;\n  }\n  a { color: inherit; text-decoration: none; }\n  ::selection { background: var(--orange); color: var(--bg); }\n\n  .wrap { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 32px; }\n  .mono { font-family: \"JetBrains Mono\", monospace; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; font-size: 12px; }\n  .display { font-family: \"Bowlby One\", sans-serif; line-height: 0.9; letter-spacing: 0.005em; }\n\n  /* paper grain */\n  body::before {\n    content: \"\"; position: fixed; inset: 0; z-index: 100; pointer-events: none;\n    background-image: repeating-linear-gradient(45deg, rgba(241,217,166,0.018) 0 2px, transparent 2px 6px);\n  }\n\n  /* ─────────────── NAV ─────────────── */\n  .nav {\n    position: sticky; top: 0; z-index: 50;\n    background: rgba(29,23,20,0.85);\n    backdrop-filter: blur(10px);\n    -webkit-backdrop-filter: blur(10px);\n    border-bottom: 1px solid var(--line);\n  }\n  .nav-inner {\n    display: flex; align-items: center; gap: 32px;\n    padding: 18px 32px;\n    max-width: 1200px; margin: 0 auto;\n  }\n  .nav-mark {\n    font-family: \"Bowlby One\", sans-serif;\n    font-size: 22px;\n    color: var(--cream);\n    letter-spacing: 0.005em;\n  }\n  .nav-mark .o { color: var(--orange); }\n  .nav-links { display: flex; gap: 28px; margin-left: auto; }\n  .nav-links a {\n    font-family: \"JetBrains Mono\", monospace;\n    font-weight: 500; font-size: 12px;\n    letter-spacing: 0.22em; text-transform: uppercase;\n    color: var(--muted);\n    transition: color 0.15s;\n  }\n  .nav-links a:hover { color: var(--orange); }\n  .nav-loc {\n    display: inline-flex; align-items: center; gap: 8px;\n    color: var(--orange);\n    font: 500 11px/1 \"JetBrains Mono\", monospace;\n    letter-spacing: 0.22em; text-transform: uppercase;\n  }\n  .nav-loc .dot {\n    width: 8px; height: 8px; border-radius: 999px; background: var(--orange);\n    box-shadow: 0 0 0 3px rgba(236,138,58,0.25);\n    animation: pulse 1.6s ease-in-out infinite;\n  }\n  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }\n  @media (max-width: 760px) {\n    .nav-links { display: none; }\n    .nav-inner { gap: 16px; }\n  }\n\n  /* ─────────────── HERO ─────────────── */\n  .hero {\n    position: relative;\n    padding: 96px 0 96px;\n    overflow: hidden;\n  }\n  .hero::before {\n    content: \"\";\n    position: absolute; inset: 0;\n    background: radial-gradient(ellipse at 50% 30%, rgba(236,138,58,0.18), transparent 60%);\n    pointer-events: none;\n  }\n  .hero-inner { position: relative; text-align: center; }\n  .hero .kicker {\n    color: var(--orange);\n    margin-bottom: 32px;\n    display: inline-flex; align-items: center; gap: 16px;\n  }\n  .hero .kicker .bar { width: 32px; height: 2px; background: var(--orange); }\n\n  .hero .lockup {\n    display: inline-block;\n    text-align: center;\n    line-height: 0.85;\n    font-family: \"Bowlby One\", sans-serif;\n    font-size: clamp(64px, 14vw, 200px);\n    color: var(--cream);\n    letter-spacing: 0.005em;\n    text-shadow: 0.05em 0.05em 0 var(--orange);\n  }\n  .hero .lockup .o { color: var(--orange); text-shadow: none; }\n\n  .roles {\n    margin-top: 32px;\n    display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;\n    color: var(--cream);\n    font-family: \"Bowlby One\", sans-serif;\n    font-size: clamp(16px, 2.4vw, 24px);\n    letter-spacing: 0.005em;\n  }\n  .roles .sep { color: var(--orange); }\n\n  .hero p.bio {\n    margin: 40px auto 0;\n    max-width: 680px;\n    font-size: clamp(16px, 1.6vw, 19px);\n    line-height: 1.6;\n    color: rgba(241,217,166,0.85);\n    text-wrap: pretty;\n  }\n\n  .hero .ctas {\n    margin-top: 44px;\n    display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;\n  }\n  .btn {\n    display: inline-flex; align-items: center; gap: 10px;\n    padding: 14px 22px;\n    font-family: \"JetBrains Mono\", monospace;\n    font-weight: 500; font-size: 12px;\n    letter-spacing: 0.22em; text-transform: uppercase;\n    border: 2px solid var(--cream);\n    color: var(--cream);\n    transition: transform 0.12s, box-shadow 0.12s;\n    cursor: pointer;\n  }\n  .btn:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--cream); }\n  .btn.primary { background: var(--orange); border-color: var(--orange); color: var(--bg); }\n  .btn.primary:hover { box-shadow: 4px 4px 0 var(--cream); }\n\n  /* ─────────────── SECTION SCAFFOLD ─────────────── */\n  section { padding: 96px 0; position: relative; }\n  .section-head {\n    display: flex; align-items: baseline; gap: 24px;\n    margin-bottom: 56px;\n    padding-bottom: 18px;\n    border-bottom: 1px solid var(--line-2);\n  }\n  .section-head .num {\n    font-family: \"JetBrains Mono\", monospace;\n    color: var(--orange);\n    font-size: 14px; letter-spacing: 0.28em;\n    flex-shrink: 0;\n  }\n  .section-head .title {\n    font-family: \"Bowlby One\", sans-serif;\n    font-size: clamp(28px, 4vw, 44px);\n    color: var(--cream);\n    letter-spacing: 0.005em;\n  }\n  .section-head .meta { margin-left: auto; color: var(--muted); font-family: \"JetBrains Mono\", monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }\n  @media (max-width: 600px) {\n    .section-head .meta { display: none; }\n  }\n\n  /* ─────────────── ABOUT ─────────────── */\n  .about { background: var(--bg-2); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }\n  .about-prose {\n    max-width: 760px;\n  }\n  .about-prose p {\n    font-size: clamp(20px, 2.2vw, 26px);\n    line-height: 1.5;\n    color: var(--cream);\n    margin: 0 0 24px;\n    text-wrap: pretty;\n  }\n  .about-prose p:last-child { margin-bottom: 0; }\n  .about-prose em { color: var(--orange); font-style: normal; }\n  .about-card {\n    background: var(--bg);\n    border: 1.5px solid var(--line-2);\n    padding: 28px;\n  }\n  .about-card .label {\n    font: 500 11px/1 \"JetBrains Mono\", monospace;\n    letter-spacing: 0.28em; text-transform: uppercase;\n    color: var(--orange);\n    margin-bottom: 18px;\n  }\n  .about-card .row {\n    display: flex; justify-content: space-between; align-items: baseline;\n    padding: 14px 0;\n    border-bottom: 1px dashed var(--line);\n  }\n  .about-card .row:last-of-type { border-bottom: 0; }\n  .about-card .row .k { color: var(--muted); font-family: \"JetBrains Mono\", monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; }\n  .about-card .row .v {\n    font-family: \"Space Grotesk\", sans-serif;\n    font-weight: 600;\n    color: var(--cream);\n    font-size: 17px;\n    letter-spacing: 0.005em;\n  }\n  .about-card .row .v .o { color: var(--orange); }\n  @media (max-width: 800px) {\n    .about-grid { grid-template-columns: 1fr; gap: 40px; }\n    .about-grid p { font-size: 18px; }\n  }\n\n  /* ─────────────── TOPICS ─────────────── */\n  .topics-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 0;\n    border: 1px solid var(--line-2);\n  }\n  .topic {\n    border-right: 1px solid var(--line-2);\n    border-bottom: 1px solid var(--line-2);\n    padding: 32px 28px;\n    background: var(--bg-2);\n    position: relative;\n    transition: background 0.15s;\n  }\n  .topic:hover { background: var(--bg-3); }\n  .topic:nth-child(3n) { border-right: 0; }\n  .topic:nth-last-child(-n+3) { border-bottom: 0; }\n  .topic .top {\n tion: reduce) {\n    .marquee-track { animation: none; }\n    .nav-loc .dot { animation: none; }\n    html { scroll-behavior: auto; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ─────────────── NAV ─────────────── -->\n<nav class=\"nav\">\n  <div class=\"nav-inner\">\n    <a class=\"nav-mark\" href=\"#top\">BURT<span class=\"o\">.<\u002Fspan><\u002Fa>\n    <div class=\"nav-links\">\n      <a href=\"#about\">About<\u002Fa>\n      <a href=\"#topics\">Topics<\u002Fa>\n      <a href=\"#connect\">Connect<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"nav-loc\"><span class=\"dot\"><\u002Fspan>Palmer · TX<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ─────────────── HERO ─────────────── -->\n<header id=\"top\" class=\"hero\">\n  <div class=\"wrap hero-inner\">\n    <div class=\"kicker mono\"><span class=\"bar\"><\u002Fspan>Palmer, Texas · Online Everywhere<span class=\"bar\"><\u002Fspan><\u002Fdiv>\n\n    <div class=\"lockup\">HEY<span class=\"o\">.<\u002Fspan> IT'S BURT<span class=\"o\">.<\u002Fspan><\u002Fdiv>\n\n    <div class=\"roles\">\n      <span>Builder<\u002Fspan>\n      <span class=\"sep\">✦<\u002Fspan>\n      <span>Tinkerer<\u002Fspan>\n      <span class=\"sep\">✦<\u002Fspan>\n      <span>Signal Chaser<\u002Fspan>\n      <span class=\"sep\">✦<\u002Fspan>\n      <span>Capitalist<\u002Fspan>\n    <\u002Fdiv>\n\n    <p class=\"bio\">I break things to understand them, build things to prove I can, and share everything along the way. From servers in my garage to signals in the air — if it runs on power and curiosity, I'm in.<\u002Fp>\n\n    <div class=\"ctas\">\n      <a class=\"btn primary\" href=\"#connect\">Find me online ↓<\u002Fa>\n      <a class=\"btn\" href=\"https://github.com/josephburt\" target=\"_blank\" rel=\"noopener\">GitHub →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ─────────────── ABOUT ─────────────── -->\n<section id=\"about\" class=\"about\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <span class=\"num\">01<\u002Fspan>\n      <span class=\"title\">About<\u002Fspan>\n      <span class=\"meta\">— who's behind the keyboard<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"about-prose\">\n      <p>I'm <em>Joseph<\u002Fem> — a builder out of Palmer, Texas, with a garage full of servers, radios, and single-board computers that probably shouldn't be running.<\u002Fp>\n      <p>My day is split between <em>shipping things<\u002Fem>, <em>tinkering with things<\u002Fem>, and figuring out what I'd need to build next to scratch whatever itch I'm chasing this week. I document it all in public.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────── TOPICS ─────────────── -->\n<section id=\"topics\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <span class=\"num\">02<\u002Fspan>\n      <span class=\"title\">Topics &amp; Interests<\u002Fspan>\n      <span class=\"meta\">— what I'm into<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"topics-grid\">\n      <article class=\"topic\">\n        <div class=\"top\"><span class=\"label\">// home lab<\u002Fspan><span class=\"glyph\">🖥️<\u002Fspan><\u002Fdiv>\n        <h3>Home Lab &amp; Self-Hosting<\u002Fh3>\n        <p>Running servers out of my home to experiment with virtualization, networking, and self-hosted services. The garage is the lab, and the lab never sleeps.<\u002Fp>\n      <\u002Farticle>\n\n      <article class=\"topic\">\n        <div class=\"top\"><span class=\"label\">// ai<\u002Fspan><span class=\"glyph\">🤖<\u002Fspan><\u002Fdiv>\n        <h3>AI &amp; Vibe-Coding<\u002Fh3>\n        <p>Prompting, tinkering, and shipping — using AI tools to build faster and debug smarter. If it involves LLMs or pushing code without a plan, I'm into it.<\u002Fp>\n      <\u002Farticle>\n\n      <article class=\"topic\">\n        <div class=\"top\"><span class=\"label\">// radio<\u002Fspan><span class=\"glyph\">📡<\u002Fspan><\u002Fdiv>\n        <h3>No-License Radio<\u002Fh3>\n        <p>FRS, GMRS, CB, and everything in between. The magic of wireless communication doesn't require a ticket to get started — just curiosity and a handheld.<\u002Fp>\n      <\u002Farticle>\n\n      <article class=\"topic\">\n        <div class=\"top\"><span class=\"label\">// hardware<\u002Fspan><span class=\"glyph\">🔧<\u002Fspan><\u002Fdiv>\n        <h3>SBC &amp; Computers<\u002Fh3>\n        <p>Raspberry Pi, Orange Pi, and all things single-board. Small computers solving big problems — or at least interesting ones.<\u002Fp>\n      <\u002Farticle>\n\n      <article class=\"topic\">\n        <div class=\"top\"><span class=\"label\">// business<\u002Fspan><span class=\"glyph\">💰<\u002Fspan><\u002Fdiv>\n        <h3>Business &amp; Capitalism<\u002Fh3>\n        <p>Entrepreneurship, side hustles, market dynamics, and the pursuit of building things that create value. I believe in the grind and the system it runs on.<\u002Fp>\n      <\u002Farticle>\n\n      <article class=\"topic\">\n        <div class=\"top\"><span class=\"label\">// texas<\u002Fspan><span class=\"glyph\">⭐<\u002Fspan><\u002Fdiv>\n        <h3>Sports &amp; Texas<\u002Fh3>\n        <p>Rangers baseball, Stars hockey, and F1 racing — that's the holy trinity. Texas isn't just where I live, it's how I think. Lone Star through and through.<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────── MARQUEE ─────────────── -->\n<div class=\"marquee\" aria-hidden=\"true\">\n  <div class=\"marquee-track\">\n    <!-- doubled content for seamless loop -->\n    <span class=\"tag\">HOME LAB<\u002Fspan><span class=\"star\">✦<\u002Fspan>\n    <span class=\"tag\">SELF-HOSTING<\u002Fspan><span class=\"star\">✦<\u002Fspan>\n    <span class=\"tag\">VIBE-CODING<\u002Fspan><span class=\"star\">✦<\u002Fspan>\n    <span class=\"tag\">AI &amp; LLMs<\u002Fspan><span class=\"star\">✦<\u002Fspan>\n    <span class=\"tag\">NO-LICENSE RADIO<\u002Fspan><span class=\"star\">✦<\u002Fspan>\n    <span class=\"t
